<nav class="site-nav">
    <div class="nav-inner">
      <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
  
      <div class="nav-links">
        {% for item in site.data.navigation %}
          {% assign item_url = item.link | relative_url %}
          <a
            href="{{ item_url }}"
            class="{% if page.url == item.link %}active{% endif %}"
          >
            {{ item.name }}
          </a>
        {% endfor %}
      </div>
    </div>
</nav>
