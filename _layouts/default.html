<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <!-- Keep the Slate theme styling -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      /* simple navbar styling that plays nice with Slate */
      .site-nav { border-bottom: 1px solid rgba(0,0,0,.1); margin-bottom: 1.5rem; }
      .nav-inner { max-width: 980px; margin: 0 auto; padding: .8rem 1rem; display: flex; gap: 1rem; align-items: center; justify-content: space-between; }
      .site-title { font-weight: 700; text-decoration: none; }
      .nav-links { display: flex; flex-wrap: wrap; gap: .75rem; }
      .nav-links a { text-decoration: none; padding: .25rem .4rem; border-radius: .35rem; }
      .nav-links a.active { background: rgba(0,0,0,.08); }
      .page-wrap { max-width: 980px; margin: 0 auto; padding: 0 1rem 2rem; }
    </style>
  </head>

  <body>
    {% include navbar.html %}

    <main class="page-wrap">
      {{ content }}
    </main>
  </body>
</html>
